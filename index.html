<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My Beautiful To-Do List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-check-circle"></i> My To-Do List</h1>
        <p class="subtitle">Stay organized and never miss a task! </p>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="What needs to be done?">
                <button onclick="addTask()">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </div>
            <div class="input-row">
                <input type="datetime-local" id="reminderInput">
            </div>
        </div>

        <div class="stats">
            <div>Total Tasks: <span id="totalTasks">0</span></div>
            <div>Completed: <span id="completedTasks">0</span></div>
            <div>Pending: <span id="pendingTasks">0</span></div>
        </div>

        <ul id="taskList"></ul>

        <div class="empty-state" id="emptyState">
            <i class="fas fa-clipboard-list"></i>
            <h3>No tasks yet!</h3>
            <p>Add a task above to get started</p>
        </div>
    </div>

    <div class="notification" id="notification">
        <div class="notification-icon">
            <i class="fas fa-bell"></i>
        </div>
        <div class="notification-content">
            <h4>Reminder!</h4>
            <p id="notificationText">Time to complete your task</p>
        </div>
        <button class="close-notification" onclick="closeNotification()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
